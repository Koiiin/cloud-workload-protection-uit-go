apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: uit-go-app
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: python:3.11-slim
        ports:
        - containerPort: 8001
        env:
        - name: SERVICE_NAME
          value: "user-service"
        - name: POSTGRES_HOST
          value: "postgresql"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        command:
        - python
        - -c
        - |
          import http.server
          import socketserver
          import json
          import os

          PORT = 8001

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  data = {
                      "service": "user-service",
                      "status": "running",
                      "database": {
                          "host": os.getenv("POSTGRES_HOST"),
                          "port": os.getenv("POSTGRES_PORT"),
                          "db": os.getenv("POSTGRES_DB")
                      },
                      "message": "UIT-Go User Service baseline is running"
                  }

                  self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(json.dumps(data).encode())

          with socketserver.TCPServer(("", PORT), Handler) as httpd:
              print(f"user-service listening on port {PORT}")
              httpd.serve_forever()

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: uit-go-app
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
  - name: http
    port: 8001
    targetPort: 8001
